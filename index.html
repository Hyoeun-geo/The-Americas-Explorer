<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아메리카 대륙 마스터 - 지리 탐구</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #1c1917; 
        }

        #map-container {
            background-color: #f5f5f4; 
            position: relative;
            overflow: hidden;
        }
        
        .country {
            stroke: #ffffff;
            stroke-width: 0.5px;
            transition: fill 0.4s ease, opacity 0.3s ease;
            cursor: pointer;
        }
        
        .country:hover {
            opacity: 0.8;
            stroke-width: 1.5px;
            stroke: #a8a29e;
        }
        
        /* 상태별 색상 강조 */
        .country.active {
            fill: #292524 !important;
            stroke: #ffffff;
            stroke-width: 1px;
            z-index: 10;
        }
        
        .country.correct { fill: #15803d !important; }
        .country.wrong { fill: #b91c1c !important; }

        /* 월드컵 같은 조 국가 */
        .country.wc-group-active { fill: #0f766e !important; }

        /* 배틀 상대 국가 (각기 다른 색상) */
        .country.battle-target-0 { fill: #b91c1c !important; } 
        .country.battle-target-1 { fill: #1d4ed8 !important; } 
        .country.battle-target-2 { fill: #b45309 !important; } 

        .battle-winner {
            transform: scale(1.05);
            border: 2px solid #292524;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            z-index: 10;
        }
        .battle-loser {
            opacity: 0.3;
            filter: grayscale(100%);
            transform: scale(0.95);
            transition: all 0.4s ease;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

        .nav-btn {
            position: relative;
            color: #78716c;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover { color: #1c1917; }
        .nav-btn.active {
            color: #1c1917;
            font-weight: 700;
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #1c1917;
        }

        /* 지형지물 면/선(Shape) 스타일 */
        .terrain-shape {
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .terrain-shape-mountain { stroke: #92400e; stroke-width: 16px; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.4; vector-effect: non-scaling-stroke; }
        .terrain-shape-river { stroke: #3b82f6; stroke-width: 3.5px; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.9; vector-effect: non-scaling-stroke; }
        .terrain-shape-river-tributary { stroke: #60a5fa; stroke-width: 1.5px; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.7; vector-effect: non-scaling-stroke; }
        .terrain-shape-plain { fill: #4ade80; opacity: 0.5; stroke: #166534; stroke-width: 1.5px; stroke-dasharray: 4,4; }
        .terrain-shape-highland { fill: #f59e0b; opacity: 0.5; stroke: #92400e; stroke-width: 1.5px; stroke-dasharray: 4,4; }
        .terrain-shape-desert { fill: #fde047; opacity: 0.7; stroke: #ca8a04; stroke-width: 1.5px; stroke-dasharray: 4,4; }

        /* 활성화(클릭) 시 Shape 스타일 */
        .terrain-active.terrain-shape-mountain { stroke: #78350f; opacity: 0.8; stroke-width: 20px; }
        .terrain-active.terrain-shape-river { stroke: #1d4ed8; stroke-width: 5.5px; opacity: 1; }
        .terrain-active.terrain-shape-river-tributary { stroke: #2563eb; stroke-width: 3px; opacity: 0.9; }
        .terrain-active.terrain-shape-plain { fill: #22c55e; opacity: 0.8; }
        .terrain-active.terrain-shape-highland { fill: #d97706; opacity: 0.8; }
        .terrain-active.terrain-shape-desert { fill: #eab308; opacity: 0.9; }

        /* 텍스트 라벨 스타일 */
        .terrain-text {
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
            font-size: 11px;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9), -1px -1px 2px rgba(255,255,255,0.9);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .terrain-text-mountain { fill: #78350f; }
        .terrain-text-river { fill: #1d4ed8; }
        .terrain-text-plain { fill: #14532d; }
        .terrain-text-highland { fill: #92400e; }
        .terrain-text-desert { fill: #a16207; }

        .terrain-active.terrain-text {
            font-weight: 900;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(255,255,255,1), -2px -2px 4px rgba(255,255,255,1);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 첫 화면 -->
    <div id="home-screen" class="absolute inset-0 bg-stone-50 z-50 flex items-center justify-center transition-opacity duration-700">
        <div class="max-w-6xl w-full px-8 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            <div class="space-y-6">
                <p class="text-stone-500 tracking-widest text-sm font-medium uppercase">Middle School Geography</p>
                <h1 class="text-5xl md:text-6xl font-light text-stone-900 tracking-tight leading-tight">
                    아메리카 대륙 <br><span class="font-bold">탐구 프로젝트</span>
                </h1>
                <div class="bg-white border border-stone-200 p-5 rounded-lg shadow-sm">
                    <p class="text-sm text-stone-600 font-bold mb-2"><i class="fas fa-info-circle text-stone-400 mr-1"></i> 학습 안내</p>
                    <p class="text-sm text-stone-500 leading-relaxed">
                        우측의 4가지 스테이지를 순서대로 클릭하여 학습을 진행하세요. 지도를 직접 탐색하며 아메리카 대륙의 지리, 문화, 통계를 전문적으로 분석할 수 있습니다.
                    </p>
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <button onclick="startApp('study')" class="group text-left p-6 bg-white border border-stone-200 hover:border-stone-900 transition-colors flex justify-between items-center rounded-lg shadow-sm hover:shadow-md">
                    <div>
                        <span class="block text-xs font-bold text-stone-400 tracking-wider mb-1">STAGE 1</span>
                        <span class="block text-xl font-medium text-stone-900">지리 데이터 탐색</span>
                    </div>
                    <span class="text-stone-300 group-hover:text-stone-900 transition-colors text-2xl">→</span>
                </button>

                <button onclick="startApp('quiz')" class="group text-left p-6 bg-white border border-stone-200 hover:border-stone-900 transition-colors flex justify-between items-center rounded-lg shadow-sm hover:shadow-md">
                    <div>
                        <span class="block text-xs font-bold text-stone-400 tracking-wider mb-1">STAGE 2</span>
                        <span class="block text-xl font-medium text-stone-900">영토 퀴즈</span>
                    </div>
                    <span class="text-stone-300 group-hover:text-stone-900 transition-colors text-2xl">→</span>
                </button>

                <button onclick="startApp('worldcup')" class="group text-left p-6 bg-white border border-stone-200 hover:border-stone-900 transition-colors flex justify-between items-center rounded-lg shadow-sm hover:shadow-md">
                    <div>
                        <span class="block text-xs font-bold text-stone-400 tracking-wider mb-1">STAGE 3</span>
                        <span class="block text-xl font-medium text-stone-900">월드컵 조편성 분석</span>
                    </div>
                    <span class="text-stone-300 group-hover:text-stone-900 transition-colors text-2xl">→</span>
                </button>

                <button onclick="startApp('battle')" class="group text-left p-6 bg-white border border-stone-200 hover:border-stone-900 transition-colors flex justify-between items-center rounded-lg shadow-sm hover:shadow-md">
                    <div>
                        <span class="block text-xs font-bold text-stone-400 tracking-wider mb-1">STAGE 4</span>
                        <span class="block text-xl font-medium text-stone-900">국가 스탯 시뮬레이션</span>
                    </div>
                    <span class="text-stone-300 group-hover:text-stone-900 transition-colors text-2xl">→</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 헤더 -->
    <header class="bg-white border-b border-stone-200 z-10 flex-shrink-0">
        <div class="max-w-screen-2xl mx-auto px-6 h-16 flex justify-between items-center">
            <h1 class="text-lg font-bold text-stone-900 tracking-tight cursor-pointer flex items-center gap-2" onclick="goHome()">
                <i class="fas fa-globe-americas text-stone-400"></i> AMERICA CONTINENT
            </h1>
            <nav class="flex gap-6 lg:gap-8 text-sm h-full items-center">
                <button id="btn-home" class="nav-btn h-full" onclick="goHome()">
                    <i class="fas fa-home"></i> 처음으로
                </button>
                <div class="w-px h-4 bg-stone-300 hidden sm:block"></div>
                <button id="btn-study" class="nav-btn h-full" onclick="switchMode('study')">1. 탐색</button>
                <button id="btn-quiz" class="nav-btn h-full" onclick="switchMode('quiz')">2. 퀴즈</button>
                <button id="btn-worldcup" class="nav-btn h-full" onclick="switchMode('worldcup')">3. 월드컵</button>
                <button id="btn-battle" class="nav-btn h-full" onclick="switchMode('battle')">4. 시뮬레이션</button>
            </nav>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-1 flex overflow-hidden w-full max-w-screen-2xl mx-auto">
        <!-- 왼쪽 지도 -->
        <div id="map-container" class="w-3/5 h-full relative border-r border-stone-200">
            
            <!-- 지형 레이어 토글 버튼 -->
            <button id="layer-toggle-btn" class="absolute top-6 right-6 bg-white/90 backdrop-blur-sm border border-stone-300 shadow-sm rounded-md px-4 py-2 text-xs font-bold text-stone-700 hover:bg-stone-50 hover:text-stone-900 z-20 transition-colors hidden" onclick="toggleTerrain()">
                <i id="layer-toggle-icon" class="fas fa-layer-group text-stone-500 mr-1"></i> <span id="layer-toggle-text">자연환경 보기</span>
            </button>

            <!-- 범례 -->
            <div id="map-legend" class="absolute bottom-6 left-6 bg-white/90 backdrop-blur-sm px-4 py-3 border border-stone-200 text-xs font-medium text-stone-600 z-10 pointer-events-none hidden rounded-md shadow-sm"></div>

            <!-- 로딩 화면 -->
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center bg-stone-50 z-30">
                <i class="fas fa-circle-notch fa-spin text-stone-400 text-3xl mb-3"></i>
                <p class="text-sm font-medium text-stone-500 tracking-widest uppercase">지도를 불러오는 중입니다...</p>
            </div>

            <svg id="map" class="w-full h-full"></svg>
        </div>

        <!-- 오른쪽 정보 패널 -->
        <div id="panel-container" class="w-2/5 h-full bg-white overflow-y-auto relative"></div>
    </main>

            { id: "t-amazon-trib2", groupId: "g-amazon", name: "", type: "river-tributary", geometry: { type: "LineString", coordinates: [[-65.0, -13.0], [-63.5, -9.0], [-61.5, -3.5]] }, desc: "" },
            { id: "t-amazon-trib3", groupId: "g-amazon", name: "", type: "river-tributary", geometry: { type: "LineString", coordinates: [[-58.0, -11.0], [-56.5, -6.5], [-55.5, -2.2]] }, desc: "" },
            { id: "t-amazon-trib4", groupId: "g-amazon", name: "", type: "river-tributary", geometry: { type: "LineString", coordinates: [[-53.5, -10.5], [-52.8, -6.0], [-52.5, -1.5]] }, desc: "" },
            { id: "t-amazon-trib5", groupId: "g-amazon", name: "", type: "river-tributary", geometry: { type: "LineString", coordinates: [[-74.5, 0.5], [-72.5, -1.5], [-70.5, -3.8]] }, desc: "" },
            { id: "t-amazon-trib6", groupId: "g-amazon", name: "", type: "river-tributary", geometry: { type: "LineString", coordinates: [[-70.0, -9.5], [-68.0, -6.5], [-66.0, -3.4], [-64.5, -3.1]] }, desc: "" }
        ];

        let currentMode = 'home';
        let selectedCountryId = null;
        let selectedTerrain = null; 
        let mapFeatures = [];
        let d3Map, pathGenerator, projection;
        
        let quizQuestions = [];
        let currentQIndex = 0;
        let score = 0;
        let isAnimating = false;

        let battleOpponents = [];
        let currentOpponentId = null;
        let battleScore = 0;
        let battleState = 'select_stat';
        let pendingStatKey = null;

        let quizTimerInterval = null;
        let quizTimeRemaining = 10;
        
        let showTerrain = false; 

        function getCountryColor(d) {
            const info = countryInfo[d.properties.name];
            let baseColor = '#e7e5e4'; // stone-200

            if (currentMode === 'worldcup') {
                if (!info || info.wcGroup.includes('실패') || info.wcGroup.includes('불가')) return baseColor;
                return '#93c5fd'; 
            } else if (currentMode === 'battle' || currentMode === 'battle_arena') {
                if (!info) return baseColor;
                if (selectedCountryId) return baseColor; 
                return '#d6d3d1'; 
            } else if (currentMode === 'quiz' || currentMode === 'result') {
                return baseColor; 
            }
            return info ? '#d6d3d1' : baseColor;
        }

        async function init() {
            try {
                let data;
                try {
                    const res = await fetch('https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json');
                    if (!res.ok) throw new Error("Primary CDN failed");
                    data = await res.json();
                } catch (err) {
                    const fallbackRes = await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
                    data = await fallbackRes.json();
                }
                
                // countryInfo에 명시된 국가들만 필터링하여 렌더링
                const targetCountries = Object.keys(countryInfo);
                
                mapFeatures = data.features.filter(f => 
                    targetCountries.includes(f.properties.name)
                );

                document.getElementById('loading').style.display = 'none';
                drawMap();
                
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(drawMap, 200);
                });

            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-sm font-medium text-red-700">지도 데이터를 불러오지 못했습니다.</p>`;
            }
        }

        function drawMap() {
            const container = document.getElementById('map-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            const svg = d3.select('#map');
            svg.selectAll("*").remove(); 
            
            // 바탕(바다) 클릭 시 지형 및 국가 선택 해제
            svg.on('click', () => {
                d3.selectAll('.terrain-active').classed('terrain-active', false);
                if (currentMode === 'study' && selectedTerrain) {
                    selectedTerrain = null;
                    renderPanel();
                }
            });

            const g = svg.append('g');

            const zoom = d3.zoom()
                .scaleExtent([0.8, 8])
                .on('zoom', (event) => { g.attr('transform', event.transform); });
            svg.call(zoom);

            projection = d3.geoMercator()
                .center([-80, 5])
                .scale(Math.min(width, height) * 0.45)
                .translate([width / 2, height / 2]);

            pathGenerator = d3.geoPath().projection(projection);

            g.selectAll('path.country')
                .data(mapFeatures)
                .enter()
                .append('path')
                .attr('d', pathGenerator)
                .attr('class', 'country')
                .attr('id', d => `country-${d.properties.name.replace(/\s+/g, '-')}`)
                .attr('fill', d => getCountryColor(d))
                .on('click', (event, d) => handleCountryClick(event, d));

            // 수도 표시 (작은 국가는 점도 작게 다이내믹 스케일링 적용)
            const starData = mapFeatures.filter(d => countryInfo[d.properties.name]);
            g.selectAll('circle.capital-dot')
                .data(starData)
                .enter()
                .append('circle')
                .attr('class', 'capital-dot')
                .attr('cx', d => projection(countryInfo[d.properties.name].coords)[0])
                .attr('cy', d => projection(countryInfo[d.properties.name].coords)[1])
                .attr('r', d => {
                    const area = countryInfo[d.properties.name].rawArea;
                    if (area <= 5) return 0.6;   // 푸에르토리코, 바하마, 엘살바도르 등 영토가 아주 작은 국가
                    if (area <= 15) return 1;    // 자메이카, 아이티, 과테말라 등
                    if (area <= 50) return 1.2;  // 코스타리카 등
                    return 2;                    // 미국, 브라질 등 거대 국가
                })
                .style('fill', '#1c1917')
                .style('stroke', '#ffffff')
                .style('stroke-width', d => {
                    const area = countryInfo[d.properties.name].rawArea;
                    return area <= 15 ? '0.2px' : '0.5px';
                })
                .style('pointer-events', 'none');
                
            // 대양 이름
            const oceanStyle = { "fill": "#a8a29e", "font-size": "24px", "font-weight": "700", "letter-spacing": "8px", "opacity": "0.4", "pointer-events": "none", "text-anchor": "middle" };
            
            g.append("text").attr("x", projection([-105, 0])[0]).attr("y", projection([-105, 0])[1]).text("태평양")
             .style("fill", oceanStyle.fill).style("font-size", oceanStyle["font-size"]).style("letter-spacing", oceanStyle["letter-spacing"]).style("opacity", oceanStyle.opacity).attr("text-anchor", oceanStyle["text-anchor"]).style("pointer-events", "none");

            g.append("text").attr("x", projection([-40, 15])[0]).attr("y", projection([-40, 15])[1]).text("대서양")
             .style("fill", oceanStyle.fill).style("font-size", oceanStyle["font-size"]).style("letter-spacing", oceanStyle["letter-spacing"]).style("opacity", oceanStyle.opacity).attr("text-anchor", oceanStyle["text-anchor"]).style("pointer-events", "none");

            g.append("text").attr("x", projection([-89, 23])[0]).attr("y", projection([-89, 23])[1]).text("멕시코만")
             .style("fill", oceanStyle.fill).style("font-size", "12px").style("font-weight", "700").style("letter-spacing", "3px").style("opacity", oceanStyle.opacity).attr("text-anchor", "middle").style("pointer-events", "none");

            // 적도
            g.append("path")
             .datum({type: "LineString", coordinates: [[-140, 0], [-30, 0]]})
             .attr("d", pathGenerator)
             .attr("stroke", "#dc2626")
             .attr("stroke-width", 1.5)
             .attr("stroke-dasharray", "4,4")
             .attr("fill", "none")
             .style("opacity", 0.6)
             .style("pointer-events", "none");

            g.append("text")
             .attr("x", projection([-140, 0])[0] - 8)
             .attr("y", projection([-140, 0])[1])
             .text("적도 (0°)")
             .style("fill", "#dc2626")
             .style("font-size", "12px")
             .style("font-weight", "700")
             .style("letter-spacing", "1px")
             .attr("text-anchor", "end")
             .attr("dominant-baseline", "central")
             .style("opacity", 0.8)
             .style("pointer-events", "none");

            const organicLine = d3.line()
                .curve(d3.curveBasis) 
                .x(d => projection(d)[0])
                .y(d => projection(d)[1]);

            const organicPolygon = d3.line()
                .curve(d3.curveBasisClosed) 
                .x(d => projection(d)[0])
                .y(d => projection(d)[1]);

            g.selectAll('path.terrain-shape')
                .data(terrainFeatures)
                .enter()
                .append('path')
                .attr('class', d => `terrain-feature terrain-shape terrain-shape-${d.type} group-${d.groupId}`)
                .attr('id', d => `shape-${d.id}`)
                .attr('d', d => {
                    if (d.type === 'mountain' || d.type.startsWith('river')) {
                        return organicLine(d.geometry.coordinates);
                    }
                    return organicPolygon(d.geometry.coordinates[0]);
                })
                .style('display', showTerrain ? 'block' : 'none')
                .on('click', handleTerrainClick);

            g.selectAll('text.terrain-text')
                .data(terrainFeatures.filter(d => d.name))
                .enter()
                .append('text')
                .attr('class', d => `terrain-feature terrain-text terrain-text-${d.type} group-${d.groupId}`)
                .attr('id', d => `text-${d.id}`)
                .attr('transform', d => `translate(${projection(d.labelCoords)[0]}, ${projection(d.labelCoords)[1]}) rotate(${d.labelRotate})`)
                .text(d => d.name)
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .style('display', showTerrain ? 'block' : 'none')
                .on('click', handleTerrainClick);

            d3Map = g;
            highlightSelectedCountry();
            
            if(showTerrain && currentMode === 'study') {
                d3.selectAll('.terrain-feature').style('display', 'block');
            }
        }
        
        // 지형 클릭 시: 정보 패널 연결 및 상태 업데이트
        function handleTerrainClick(event, d) {
            event.stopPropagation(); 
            
            // 기존 선택 해제
            d3.selectAll('.terrain-active').classed('terrain-active', false);
            d3.selectAll('.country').classed('active', false); 
            selectedCountryId = null; // 국가 정보 끄기
            
            // 클릭한 지형 그룹 활성화
            const targetGroupId = d.groupId || d.id;
            d3.selectAll(`.group-${targetGroupId}`).classed('terrain-active', true);

            // 해당 그룹의 메인 정보(이름이 있는 객체)를 찾아 패널용 데이터로 저장
            selectedTerrain = terrainFeatures.find(f => (f.id === targetGroupId || f.groupId === targetGroupId) && f.name !== "");
            
            // 정보 패널 렌더링
            if(currentMode === 'study') {
                renderPanel();
            }
        }
        
        // 레이어 버튼 토글 함수 (지도를 가리지 않도록 안내는 우측 패널에 표시)
        function toggleTerrain() {
            showTerrain = !showTerrain;
            d3.selectAll('.terrain-feature').style('display', showTerrain ? 'block' : 'none');
            
            const btnSpan = document.getElementById('layer-toggle-text');
            const btnIcon = document.getElementById('layer-toggle-icon');
            
            if(showTerrain) {
                btnSpan.innerText = '자연환경 끄기';
                btnIcon.className = 'fas fa-eye-slash text-blue-500 mr-1';
            } else {
                btnSpan.innerText = '자연환경 보기';
                btnIcon.className = 'fas fa-layer-group text-stone-500 mr-1';
                
                d3.selectAll('.terrain-active').classed('terrain-active', false);
                // 지형이 꺼지면 지형 정보창도 리셋
                if(selectedTerrain) {
                    selectedTerrain = null;
                }
            }

            // 패널을 다시 그려서 자연환경 클릭 안내 문구를 띄우거나 없앰
            if (currentMode === 'study') {
                renderPanel();
            }
        }

        function highlightSelectedCountry() {
            if (!selectedCountryId) return;
            const info = countryInfo[selectedCountryId];

            if (currentMode === 'worldcup' && info && info.wcGroup.includes('조')) {
                const targetGroup = info.wcGroup.substring(0, 2);
                
                d3.selectAll('.country').classed('wc-group-active', d => {
                    const cInfo = countryInfo[d.properties.name];
                    return cInfo && cInfo.wcGroup && cInfo.wcGroup.substring(0, 2) === targetGroup && d.properties.name !== selectedCountryId;
                });
                
                d3.select(`#country-${selectedCountryId.replace(/\s+/g, '-')}`).classed('active', true);

            } else if (currentMode === 'battle') {
                d3.select(`#country-${selectedCountryId.replace(/\s+/g, '-')}`).classed('active', true);
                if(battleOpponents.length > 0) {
                    battleOpponents.forEach((opp, idx) => {
                        d3.select(`#country-${opp.replace(/\s+/g, '-')}`).classed(`battle-target-${idx}`, true);
                    });
                }
            } else if (currentMode === 'battle_arena') {
                d3.select(`#country-${selectedCountryId.replace(/\s+/g, '-')}`).classed('active', true);
                if (currentOpponentId) {
                    const oppIdx = battleOpponents.indexOf(currentOpponentId);
                    const targetClass = oppIdx !== -1 ? `battle-target-${oppIdx}` : 'battle-target-0';
                    d3.select(`#country-${currentOpponentId.replace(/\s+/g, '-')}`).classed(targetClass, true);
                }
            } else {
                d3.select(`#country-${selectedCountryId.replace(/\s+/g, '-')}`).classed('active', true);
            }
        }

        function goHome() {
            stopQuizTimer(); 
            isAnimating = false;
            currentMode = 'home';
            selectedCountryId = null;
            selectedTerrain = null;
            battleOpponents = [];
            
            const homeScreen = document.getElementById('home-screen');
            homeScreen.style.display = 'flex';
            setTimeout(() => { homeScreen.style.opacity = '1'; }, 10);
            
            resetMapStyles();
            d3.selectAll('.country').attr('fill', d => getCountryColor(d));
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('map-legend').style.display = 'none';
            d3.selectAll('.capital-dot').style('display', 'none');
            
            document.getElementById('layer-toggle-btn').style.display = 'none';
            showTerrain = false;
            d3.selectAll('.terrain-feature').style('display', 'none');
            d3.selectAll('.terrain-active').classed('terrain-active', false);
            document.getElementById('layer-toggle-text').innerText = '자연환경 보기';
            document.getElementById('layer-toggle-icon').className = 'fas fa-layer-group text-stone-500 mr-1';
            
            document.getElementById('panel-container').innerHTML = '';
        }

        function startApp(mode) {
            const homeScreen = document.getElementById('home-screen');
            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.style.display = 'none';
                switchMode(mode);
            }, 500); 
        }

        function switchMode(mode) {
            stopQuizTimer(); 
            isAnimating = false;
            currentMode = mode;
            battleOpponents = [];
            currentOpponentId = null;
            battleState = 'select_stat';
            selectedTerrain = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${mode}`);
            if(activeBtn) activeBtn.classList.add('active');

            const mapLegend = document.getElementById('map-legend');
            mapLegend.style.display = 'block';
            d3.selectAll('.capital-dot').style('display', 'block');
            
            const layerBtn = document.getElementById('layer-toggle-btn');

            if (mode === 'study') {
                layerBtn.style.display = 'block';
            } else {
                layerBtn.style.display = 'none';
                showTerrain = false;
                d3.selectAll('.terrain-feature').style('display', 'none');
                d3.selectAll('.terrain-active').classed('terrain-active', false);
                document.getElementById('layer-toggle-text').innerText = '자연환경 보기';
                document.getElementById('layer-toggle-icon').className = 'fas fa-layer-group text-stone-500 mr-1';
            }

            if(mode === 'study') {
                mapLegend.innerHTML = '<i class="fas fa-circle text-[8px] mr-1"></i> 각국의 수도 위치';
                resetMapStyles();
                highlightSelectedCountry();
            } else if (mode === 'worldcup') {
                mapLegend.innerHTML = '<strong class="text-stone-800">대한민국 FIFA 랭킹: 23위</strong>';
                resetMapStyles();
                highlightSelectedCountry();
            } else if (mode === 'battle') {
                mapLegend.innerHTML = '기준 국가를 먼저 선택하세요';
                resetMapStyles();
                if(selectedCountryId) generateBattleOpponents();
                highlightSelectedCountry();
            } else { // quiz
                d3.selectAll('.capital-dot').style('display', 'none');
                mapLegend.style.display = 'none';
                startQuiz();
            }
            
            d3.selectAll('.country').attr('fill', d => getCountryColor(d));
            renderPanel();
        }

        function startQuiz() {
            resetMapStyles();
            selectedCountryId = null;
            score = 0;
            currentQIndex = 0;
            
            const availableCountries = Object.keys(countryInfo);
            for (let i = availableCountries.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableCountries[i], availableCountries[j]] = [availableCountries[j], availableCountries[i]];
            }
            quizQuestions = availableCountries.slice(0, 10);
            renderPanel();
            startQuizTimer(); 
        }

        function generateBattleOpponents() {
            if(!selectedCountryId) return;
            const allIds = Object.keys(countryInfo);
            let pool = allIds.filter(id => id !== selectedCountryId);
            
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            battleOpponents = pool.slice(0, 3);
        }

        function handleCountryClick(event, feature) {
            if (isAnimating) return;
            event.stopPropagation(); 

            d3.selectAll('.terrain-active').classed('terrain-active', false);
            selectedTerrain = null;

            const countryId = feature.properties.name;

            if (currentMode === 'study' || currentMode === 'worldcup' || currentMode === 'battle') {
                if(!countryInfo[countryId]) return; 
                
                // 이미 선택된 국가를 다시 클릭한 경우 (선택 해제 토글 기능)
                if (selectedCountryId === countryId) {
                    selectedCountryId = null;
                    if (currentMode === 'battle') battleOpponents = [];
                } else {
                    // 새로운 국가를 클릭한 경우
                    selectedCountryId = countryId;
                    if (currentMode === 'battle') generateBattleOpponents();
                }

                d3.selectAll('.country').attr('fill', d => getCountryColor(d));
                resetMapStyles();
                highlightSelectedCountry();
                renderPanel();

            } else if (currentMode === 'quiz') {
                stopQuizTimer(); 
                const targetId = quizQuestions[currentQIndex];
                const clickedEl = d3.select(`#country-${countryId.replace(/\s+/g, '-')}`);
                const targetEl = d3.select(`#country-${targetId.replace(/\s+/g, '-')}`);

                isAnimating = true;

                if (countryId === targetId) {
                    clickedEl.classed('correct', true);
                    score += 10;
                    showQuizFeedback('correct');
                    setTimeout(nextQuestion, 1500);
                } else {
                    clickedEl.classed('wrong', true);
                    targetEl.classed('correct', true);
                    showQuizFeedback('wrong', countryId); 
                }
            }
        }

        function nextQuestion() {
            resetMapStyles();
            currentQIndex++;
            isAnimating = false;
            
            if (currentQIndex >= quizQuestions.length) {
                currentMode = 'result';
                renderPanel();
            } else {
                renderPanel();
                startQuizTimer(); 
            }
        }

        function resetMapStyles() {
            d3.selectAll('.country')
              .classed('active', false)
              .classed('correct', false)
              .classed('wrong', false)
              .classed('wc-group-active', false)
              .classed('battle-target-0', false)
              .classed('battle-target-1', false)
              .classed('battle-target-2', false);
        }

        function startQuizTimer() {
            clearInterval(quizTimerInterval);
            quizTimeRemaining = 10;
            updateTimerUI();
            
            quizTimerInterval = setInterval(() => {
                quizTimeRemaining--;
                updateTimerUI();
                
                if (quizTimeRemaining <= 0) {
                    clearInterval(quizTimerInterval);
                    handleQuizTimeout();
                }
            }, 1000);
        }

        function stopQuizTimer() {
            clearInterval(quizTimerInterval);
        }

        function updateTimerUI() {
            const timeText = document.getElementById('quiz-time-text');
            const timeBar = document.getElementById('quiz-time-bar');
            if (timeText && timeBar) {
                timeText.innerText = quizTimeRemaining;
                const percentage = (quizTimeRemaining / 10) * 100;
                timeBar.style.width = `${percentage}%`;
                
                if (quizTimeRemaining <= 3) {
                    timeBar.classList.remove('bg-blue-600');
                    timeBar.classList.add('bg-red-600');
                    timeText.classList.add('text-red-600');
                } else {
                    timeBar.classList.add('bg-blue-600');
                    timeBar.classList.remove('bg-red-600');
                    timeText.classList.remove('text-red-600');
                }
            }
        }

        function handleQuizTimeout() {
            isAnimating = true; 
            const targetId = quizQuestions[currentQIndex];
            const targetEl = d3.select(`#country-${targetId.replace(/\s+/g, '-')}`);
            
            targetEl.classed('correct', true); 
            showQuizFeedback('timeout');
        }

        function startBattleMatch(opponentId) {
            currentMode = 'battle_arena';
            currentOpponentId = opponentId;
            battleState = 'select_stat';
            pendingStatKey = null;
            
            d3.selectAll('.country').attr('fill', d => getCountryColor(d));
            resetMapStyles();
            highlightSelectedCountry();
            renderPanel();
        }

        function selectBattleStat(statKey) {
            if (battleState !== 'select_stat') return;
            pendingStatKey = statKey;
            battleState = 'guess';
            
            const statName = statKey === 'rawArea' ? '영토 면적' : (statKey === 'rawPop' ? '인구수' : 'GDP (경제 규모)');

        }

        function handleCardClick(guessedPlayerNum) {
            if (battleState !== 'guess') return;
            battleState = 'revealed';
            
            const card1 = document.getElementById('card-1');
            const card2 = document.getElementById('card-2');
            card1.classList.remove('border-blue-400', 'ring-2', 'ring-blue-200', 'cursor-pointer', 'transform', 'hover:scale-105');
            card2.classList.remove('border-blue-400', 'ring-2', 'ring-blue-200', 'cursor-pointer', 'transform', 'hover:scale-105');
            
            document.getElementById('battle-prompt').innerHTML = `<span class="text-stone-400 text-sm tracking-widest block mt-4">데이터를 분석하고 있습니다...</span>`;
            
            executeBattleOutcome(guessedPlayerNum);
        }

        function executeBattleOutcome(guessedPlayerNum) {
            const player1 = countryInfo[selectedCountryId];
            const player2 = countryInfo[currentOpponentId];
            
            const val1 = player1[pendingStatKey];
            const val2 = player2[pendingStatKey];

            setTimeout(() => {
                document.getElementById('stat-display-1').innerHTML = `<span class="text-xl md:text-2xl font-black text-blue-700 break-keep">${getStatDisplayString(player1, pendingStatKey)}</span>`;
                document.getElementById('stat-display-2').innerHTML = `<span class="text-xl md:text-2xl font-black text-blue-700 break-keep">${getStatDisplayString(player2, pendingStatKey)}</span>`;

                let actualWinner = 0;
                if (pendingStatKey === 'rawGdp') {
                    if (val1 < val2) actualWinner = 1;
                    else if (val2 < val1) actualWinner = 2;
                } else {
                    if (val1 > val2) actualWinner = 1;
                    else if (val2 > val1) actualWinner = 2;
                }

                let isCorrect = false;
                if (actualWinner !== 0 && actualWinner === guessedPlayerNum) {
                    isCorrect = true;
                    battleScore += 10;
                    document.getElementById('battle-score-display').innerText = battleScore;
                }

                if (actualWinner === 1) {
                    document.getElementById('card-1').classList.add('battle-winner');
                    document.getElementById('card-2').classList.add('battle-loser');
                    document.getElementById('goal-fx-1').style.display = 'block';
                } else if (actualWinner === 2) {
                    document.getElementById('card-2').classList.add('battle-winner');
                    document.getElementById('card-1').classList.add('battle-loser');
                    document.getElementById('goal-fx-2').style.display = 'block';
                }

                showBattleFeedback(pendingStatKey, player1, player2, actualWinner, isCorrect);

            }, 400);
        }

        function getStatDisplayString(player, statKey) {
            if(statKey === 'rawArea') return player.area.replace('약 ', '');
            if(statKey === 'rawPop') return player.pop.replace('약 ', '');
            if(statKey === 'rawGdp') return player.gdp;
            return "";
        }

        function showBattleFeedback(statKey, p1, p2, actualWinner, isCorrect) {
            const fbBox = document.getElementById('battle-feedback');
            fbBox.style.display = 'block';

            let subject = statKey === 'rawArea' ? '영토 면적이' : (statKey === 'rawPop' ? '인구가' : 'GDP(경제 규모)가');
            let winnerObj = actualWinner === 1 ? p1 : (actualWinner === 2 ? p2 : null);
            let loserObj = actualWinner === 1 ? p2 : (actualWinner === 2 ? p1 : null);

            let winnerText = winnerObj ? `${winnerObj.ko} 우위` : "동일 수준";
            let msg = "";

            if (winnerObj && loserObj) {
                if (statKey === 'rawGdp') {
                    if (loserObj.rawGdp === 999) {
                        msg = `<strong>${winnerObj.ko}</strong>(${winnerObj.gdp})이 통계 확인이 어려운 <strong>${loserObj.ko}</strong> 대비 높은 경제 규모를 기록합니다.`;
                    } else {
                        let diff = loserObj.rawGdp - winnerObj.rawGdp;
                        msg = `<strong>${winnerObj.ko}</strong>(${winnerObj.gdp})이 <strong>${loserObj.ko}</strong>(${loserObj.gdp}) 대비 세계 순위에서 <strong>${diff}단계</strong> 앞섭니다.`;
                    }
                } else {
                    let ratio = (winnerObj[statKey] / loserObj[statKey]).toFixed(1);
                    if(ratio >= 1.5) {
                        msg = `데이터 분석 결과, <strong>${winnerObj.ko}</strong>의 ${subject} <strong>${loserObj.ko}</strong> 대비 <strong>약 ${ratio}배</strong> 더 큰 규모를 보입니다.`;
                    } else {
                        msg = `<strong>${winnerObj.ko}</strong>의 ${subject} <strong>${loserObj.ko}</strong>에 비해 소폭 (약 ${ratio}배) 앞서고 있습니다.`;
                    }
                }
            } else {
                msg = `통계상 양국의 스탯 차이가 미미합니다.`;
            }

            let predictionResultHTML = isCorrect 
                ? `<span class="text-green-700 font-bold text-sm tracking-wide"><i class="fas fa-check-circle"></i> 예측 성공 (+10점)</span>`
                : `<span class="text-stone-400 font-bold text-sm tracking-wide"><i class="fas fa-times-circle"></i> 예측 실패</span>`;

            fbBox.innerHTML = `
                <div class="border-t border-stone-200 pt-6 mt-4">
                    <div class="mb-3">${predictionResultHTML}</div>
                    <h4 class="text-xl font-bold text-stone-900 mb-2">${winnerText}</h4>
                    <p class="text-sm text-stone-600 leading-relaxed mb-6">${msg}</p>
                    <button onclick="switchMode('battle')" class="w-full py-3 bg-stone-900 text-white font-medium text-sm hover:bg-stone-800 transition-colors rounded-md shadow-sm">
                        다른 국가와 다시 대결하기
                    </button>
                </div>
            `;
        }

                                </div>
                                <span class="block text-xs font-bold text-stone-400 mb-2 w-full border-b border-stone-100 pb-2">상대 국가</span>
                                <h3 class="font-bold text-xl text-stone-900 mb-4 break-keep">${p2.ko}</h3>
                                <div id="stat-display-2" class="w-full mt-auto bg-stone-50 border border-stone-100 rounded-md py-3 px-2 flex items-center justify-center min-h-[4rem]">
                                    <span class="text-2xl font-light text-stone-300">?</span>
                                </div>
                            </div>
                        </div>

                        <!-- 대결 스탯 버튼 그룹 -->
                        <div id="stat-buttons-container" class="space-y-3">
                            <button onclick="selectBattleStat('rawArea')" class="w-full py-4 border border-stone-300 bg-stone-50 hover:bg-stone-900 text-stone-700 hover:text-white font-bold text-sm transition-colors rounded-lg shadow-sm">
                                영토 면적으로 대결하기
                            </button>
                            <button onclick="selectBattleStat('rawPop')" class="w-full py-4 border border-stone-300 bg-stone-50 hover:bg-stone-900 text-stone-700 hover:text-white font-bold text-sm transition-colors rounded-lg shadow-sm">
                                인구수로 대결하기
                            </button>
                            <button onclick="selectBattleStat('rawGdp')" class="w-full py-4 border border-stone-300 bg-stone-50 hover:bg-stone-900 text-stone-700 hover:text-white font-bold text-sm transition-colors rounded-lg shadow-sm">
                                GDP (경제 규모)로 대결하기
                            </button>
                        </div>

                        <div id="battle-feedback" class="hidden"></div>
                    </div>
                `;

            } else if (currentMode === 'quiz') {
                const targetId = quizQuestions[currentQIndex];
                const targetKo = countryInfo[targetId].ko;

                panel.innerHTML = `
                    <div class="p-8 h-full flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-end border-b border-stone-200 pb-4 mb-6">
                                <div>
                                    <span class="block text-xs font-bold tracking-widest text-stone-400 uppercase mb-1">GEOGRAPHY QUIZ</span>
                                    <span class="text-sm text-stone-900 font-bold">문제 ${currentQIndex + 1} / ${quizQuestions.length}</span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-xs font-medium text-stone-400 uppercase tracking-widest mb-1">SCORE</span>
                                    <span class="text-xl font-bold text-blue-600">${score}</span>
                                </div>
                            </div>
                            
                            <div class="w-full bg-stone-200 rounded-full h-2 mb-2">
                                <div id="quiz-time-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-1000 ease-linear" style="width: 100%"></div>
                            </div>
                            <div class="text-right text-xs font-bold text-stone-500 mb-8">남은 시간: <span id="quiz-time-text" class="text-stone-900 text-base">10</span>초</div>
                            
                            <div class="text-center bg-stone-50 py-10 px-4 rounded-xl border border-stone-200">
                                <span class="block text-sm font-bold text-stone-600 mb-4">👇 10초 안에 아래 국가를 클릭하세요!</span>
                                <h2 class="text-5xl font-bold text-stone-900 tracking-tight">${targetKo}</h2>
                            </div>
                        </div>
                        
                        <div id="quiz-feedback" class="py-4 text-center opacity-0 transition-opacity duration-300"></div>
                    </div>
                `;
            } else if (currentMode === 'result') {
                panel.innerHTML = `
                    <div class="p-8 flex flex-col h-full items-center justify-center text-center">
                        <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mb-4">
                            <i class="fas fa-check text-2xl text-stone-500"></i>
                        </div>
                        <span class="block text-xs font-bold tracking-widest text-stone-400 uppercase mb-2">ASSESSMENT COMPLETE</span>
                        <h2 class="text-3xl font-light text-stone-900 mb-8">영토 퀴즈 완료</h2>
                        
                        <div class="mb-12 bg-stone-50 w-full py-8 rounded-xl border border-stone-200">
                            <span class="block text-sm font-bold text-stone-500 mb-2">최종 점수</span>
                            <div class="text-7xl font-bold text-blue-600">${score}</div>
                        </div>

                        <div class="w-full space-y-3 max-w-xs mx-auto">
                            <button onclick="switchMode('study')" class="w-full py-3 border border-stone-300 text-stone-700 text-sm font-bold hover:bg-stone-100 transition-colors rounded-lg">
                                탐색 모드로 돌아가기
                            </button>
                            <button onclick="switchMode('quiz')" class="w-full py-3 bg-stone-900 text-white text-sm font-bold hover:bg-stone-800 transition-colors rounded-lg shadow-md">
                                다시 도전하기
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function showQuizFeedback(type, clickedCountryId = null) {
            const feedbackEl = document.getElementById('quiz-feedback');
            if(!feedbackEl) return;
            
            feedbackEl.style.opacity = '1';
            
            if(type === 'correct') {
                feedbackEl.innerHTML = '<span class="text-green-700 font-bold tracking-wide bg-green-50 px-4 py-2 rounded-full border border-green-200"><i class="fas fa-check-circle"></i> 정답입니다!</span>';
            } else if (type === 'timeout') {
                feedbackEl.innerHTML = `
                    <div class="mb-4 text-red-600 font-bold tracking-wide"><i class="fas fa-clock"></i> 시간 초과! 올바른 위치가 초록색으로 표시됩니다.</div>
                    <button onclick="nextQuestion()" class="px-6 py-2 border border-stone-300 text-stone-700 font-bold text-sm hover:bg-stone-100 transition-colors rounded-md shadow-sm">다음 문제로 넘어가기</button>
                `;
            } else {
                let clickedNameKo = "알 수 없는 지역";
                if (clickedCountryId && countryInfo[clickedCountryId]) {
                    clickedNameKo = countryInfo[clickedCountryId].ko;
                }

                feedbackEl.innerHTML = `
                    <div class="mb-2 text-red-600 font-bold tracking-wide"><i class="fas fa-times-circle"></i> 오답입니다!</div>
                    <div class="mb-4 text-sm text-stone-600 bg-stone-100 py-2 px-4 rounded-lg inline-block">
                        방금 선택하신 곳은 <strong>[${clickedNameKo}]</strong>입니다.<br>올바른 위치가 초록색으로 표시됩니다.
                    </div>
                    <br>
                    <button onclick="nextQuestion()" class="px-6 py-2 border border-stone-300 text-stone-700 font-bold text-sm hover:bg-stone-100 transition-colors rounded-md shadow-sm">다음 문제로 넘어가기</button>
                `;
            }
        }

        init();
    </script>
</body>
</html>
