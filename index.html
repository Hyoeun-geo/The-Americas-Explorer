<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아메리카 대륙 탐험가 - 지리 탐구</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fdfbf7;
            color: #3e2723;
            overflow: hidden;
        }

        /* 탐험 테마 제목용 폰트 */
        .font-adventure {
            font-family: 'Gowun Dodum', sans-serif;
        }

        /* 지도 영역: 가시성을 위해 점박이 배경을 완전히 제거하고 순백색 적용 */
        #map-container {
            background-color: #ffffff; 
            background-image: none !important;
        }
        
        .country {
            stroke: #ffffff;
            stroke-width: 0.5px;
            transition: fill 0.4s ease, opacity 0.3s ease;
            cursor: pointer;
        }
        
        .country:hover {
            opacity: 0.8;
            stroke-width: 1.5px;
            stroke: #94a3b8;
        }
        
        .country.active {
            fill: #0f172a !important;
            stroke: #ffffff;
            stroke-width: 1px;
            z-index: 10;
        }
        
        .country.correct { fill: #15803d !important; }
        .country.wrong { fill: #b91c1c !important; }
        .country.wc-group-active { fill: #0d9488 !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d7ccc8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1887f; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d7ccc8; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a1887f; }

        .nav-btn {
            position: relative;
            color: #8d6e63;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
        }
        .nav-btn:hover { color: #3e2723; }
        .nav-btn.active {
            color: #2e7d32;
            font-weight: 900;
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #2e7d32;
            border-radius: 2px;
        }
        @media (min-width: 1024px) {
            .nav-btn.active::after {
                bottom: -16px;
            }
        }

        /* 지형지물 면/선(Shape) 스타일 */
        .terrain-shape {
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .terrain-shape-mountain { stroke: #5d4037; stroke-width: 16px; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.5; vector-effect: non-scaling-stroke; }
        .terrain-shape-river { stroke: #1976d2; stroke-width: 3.5px; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.8; vector-effect: non-scaling-stroke; }
        .terrain-shape-river-tributary { stroke: #42a5f5; stroke-width: 1.5px; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.7; vector-effect: non-scaling-stroke; }
        .terrain-shape-plain { fill: #81c784; opacity: 0.5; stroke: #388e3c; stroke-width: 1.5px; stroke-dasharray: 4,4; }
        .terrain-shape-highland { fill: #ffb74d; opacity: 0.5; stroke: #f57c00; stroke-width: 1.5px; stroke-dasharray: 4,4; }
        .terrain-shape-desert { fill: #fff59d; opacity: 0.7; stroke: #fbc02d; stroke-width: 1.5px; stroke-dasharray: 4,4; }
        .terrain-shape-isthmus { fill: rgba(211, 47, 47, 0.15); opacity: 0.9; stroke: #c62828; stroke-width: 2px; stroke-dasharray: 4,4; }

        /* 활성화(클릭) 시 Shape 스타일 */
        .terrain-active.terrain-shape-mountain { stroke: #3e2723; opacity: 0.8; stroke-width: 20px; }
        .terrain-active.terrain-shape-river { stroke: #0d47a1; stroke-width: 5.5px; opacity: 1; }
        .terrain-active.terrain-shape-river-tributary { stroke: #1565c0; stroke-width: 3px; opacity: 0.9; }
        .terrain-active.terrain-shape-plain { fill: #4caf50; opacity: 0.8; }
        .terrain-active.terrain-shape-highland { fill: #f57c00; opacity: 0.8; }
        .terrain-active.terrain-shape-desert { fill: #fdd835; opacity: 0.9; }
        .terrain-active.terrain-shape-isthmus { fill: rgba(198, 40, 40, 0.3); opacity: 1; stroke: #b71c1c; stroke-width: 3.5px; }

        /* 텍스트 라벨 스타일 */
        .terrain-text {
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
            font-size: 11px;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(253,251,247,0.9), -1px -1px 2px rgba(253,251,247,0.9);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .terrain-text-mountain { fill: #4e342e; }
        .terrain-text-river { fill: #0d47a1; }
        .terrain-text-plain { fill: #1b5e20; }
        .terrain-text-highland { fill: #e65100; }
        .terrain-text-desert { fill: #f57f17; }
        .terrain-text-isthmus { fill: #b71c1c; }

        .terrain-active.terrain-text {
            font-weight: 900;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(255,255,255,1), -2px -2px 4px rgba(255,255,255,1);
        }

        /* 방탈출 오답 애니메이션 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }
    </style>
</head>

    <!-- Firebase 실시간 클라우드 데이터베이스 연동 모듈 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.globalEscapeRankings = [];
        window.isFirebaseReady = false;

let firebaseConfig;

        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyCsbHOKgSlHDUZZAOG2vEgrjkeoykL_Cws",
                authDomain: "america-explorer-b0ea0.firebaseapp.com",
                databaseURL: "https://america-explorer-b0ea0-default-rtdb.firebaseio.com",
                projectId: "america-explorer-b0ea0",
                storageBucket: "america-explorer-b0ea0.firebasestorage.app",
                messagingSenderId: "326224959501",
                appId: "1:326224959501:web:ae7e0554bba4f433dd9d44",
                measurementId: "G-YFEYP3J6BB"
            };
        }

        try {
            if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getDatabase(app); 
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'america-explorer-class';

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.isFirebaseReady = true;
                        const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'escape_rankings');

                        onSnapshot(colRef, (snapshot) => {
                            window.globalEscapeRankings = [];
                            snapshot.forEach(documentSnapshot => {
                                window.globalEscapeRankings.push(documentSnapshot.data());
                            });
                            if (typeof window.refreshLeaderboard === 'function') {
                                window.refreshLeaderboard();
                            }
                        }, (error) => {
                            console.error("서버 데이터 동기화 에러:", error);
                        });

                        window.saveRankingToCloud = async (rankingData) => {
                            try {
                                await addDoc(colRef, rankingData);
                            } catch(e) {
                                console.error("클라우드 서버 저장 실패:", e);
                            }
                        };

                        window.clearCloudRankings = async () => {
                            try {
                                const snapshot = await getDocs(colRef);
                                snapshot.forEach(async (documentSnapshot) => {
                                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'escape_rankings', documentSnapshot.id));
                                });
                            } catch(e) {
                                console.error("클라우드 서버 기록 삭제 실패:", e);
                            }
                        };
                    }
                });
            }
        } catch (e) {
            console.error("클라우드 서버 초기화 실패:", e);
        }
    </script>

        }

        async function init() {
            try {
                let data;
                try {
                    const res = await fetch('https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json');
                    if (!res.ok) throw new Error("Primary CDN failed");
                    data = await res.json();
                } catch (err) {
                    const fallbackRes = await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
                    data = await fallbackRes.json();
                }
                
                const targetCountries = Object.keys(countryInfo);
                mapFeatures = data.features.filter(f => targetCountries.includes(f.properties.name));

                document.getElementById('loading').style.display = 'none';
                drawMap();
                
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(drawMap, 200);
                });

            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-sm font-medium text-red-700">지도 데이터를 불러오지 못했습니다.</p>`;
            }
        }

        function drawMap() {
            const container = document.getElementById('map-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            const svg = d3.select('#map');
            svg.selectAll("*").remove(); 
            
            svg.on('click', () => {
                d3.selectAll('.terrain-active').classed('terrain-active', false);
                if (currentMode === 'study' && selectedTerrain) {
                    selectedTerrain = null;
                    renderPanel();
                }
            });

            const g = svg.append('g');

            zoom = d3.zoom()
                .scaleExtent([0.8, 8])
                .on('zoom', (event) => { g.attr('transform', event.transform); });
            svg.call(zoom);

            const isMobile = window.innerWidth < 1024;
            const scaleFactor = isMobile ? 0.7 : 0.45;
            const mapCenter = isMobile ? [-85, 10] : [-80, 5]; 

            projection = d3.geoMercator()
                .center(mapCenter)
                .scale(Math.min(width, height) * scaleFactor)
                .translate([width / 2, height / 2]);

            pathGenerator = d3.geoPath().projection(projection);

            g.selectAll('path.country')
                .data(mapFeatures)
                .enter()
                .append('path')
                .attr('d', pathGenerator)
                .attr('class', 'country')
                .attr('id', d => `country-${d.properties.name.replace(/\s+/g, '-')}`)
                .attr('fill', d => getCountryColor(d))
                .on('click', (event, d) => handleCountryClick(event, d));

            const starData = mapFeatures.filter(d => countryInfo[d.properties.name]);
            g.selectAll('circle.capital-dot')
                .data(starData)
                .enter()
                .append('circle')
                .attr('class', 'capital-dot')
                .attr('cx', d => projection(countryInfo[d.properties.name].coords)[0])
                .attr('cy', d => projection(countryInfo[d.properties.name].coords)[1])
                .attr('r', d => {
                    const area = countryInfo[d.properties.name].rawArea;
                    if (area <= 5) return 0.6;
                    if (area <= 15) return 1;
                    if (area <= 50) return 1.2;
                    return 2;
                })
                .style('fill', '#0f172a')
                .style('stroke', '#ffffff')
                .style('stroke-width', d => {
                    const area = countryInfo[d.properties.name].rawArea;
                    return area <= 15 ? '0.2px' : '0.5px';
                })
                .style('pointer-events', 'none');
                
            const oceanStyle = { "fill": "#8d6e63", "opacity": "0.3", "pointer-events": "none", "text-anchor": "middle" };
            
            g.append("text").attr("x", projection([-105, 0])[0]).attr("y", projection([-105, 0])[1]).text("태평양")
             .style("fill", oceanStyle.fill).style("font-size", "16px").style("font-weight", "900").style("letter-spacing", "6px").style("opacity", oceanStyle.opacity).attr("text-anchor", oceanStyle["text-anchor"]).style("pointer-events", "none");

            g.append("text").attr("x", projection([-40, 15])[0]).attr("y", projection([-40, 15])[1]).text("대서양")
             .style("fill", oceanStyle.fill).style("font-size", "16px").style("font-weight", "900").style("letter-spacing", "6px").style("opacity", oceanStyle.opacity).attr("text-anchor", oceanStyle["text-anchor"]).style("pointer-events", "none");

            g.append("text").attr("x", projection([-90, 24])[0]).attr("y", projection([-90, 24])[1]).text("멕시코만")
             .style("fill", oceanStyle.fill).style("font-size", "10px").style("font-weight", "900").style("letter-spacing", "2px").style("opacity", oceanStyle.opacity).attr("text-anchor", "middle").style("pointer-events", "none");

            g.append("text").attr("x", projection([-76, 14])[0]).attr("y", projection([-76, 14])[1]).text("카리브해")
             .style("fill", oceanStyle.fill).style("font-size", "10px").style("font-weight", "700").style("letter-spacing", "2px").style("opacity", oceanStyle.opacity).attr("text-anchor", "middle").style("pointer-events", "none");

            // 적도 (실선)
            g.append("path")
             .datum({type: "LineString", coordinates: [[-140, 0], [-30, 0]]})
             .attr("d", pathGenerator)
             .attr("stroke", "#c62828")
             .attr("stroke-width", 1.5)
             .attr("fill", "none")
             .style("opacity", 0.6)
             .style("pointer-events", "none");

            g.append("text")
             .attr("x", projection([-140, 0])[0] - 8)
             .attr("y", projection([-140, 0])[1])
             .text("적도 (0°)")
             .style("fill", "#c62828")
             .style("font-size", "11px")
             .style("font-weight", "700")
             .style("letter-spacing", "1px")
             .attr("text-anchor", "end")
             .attr("dominant-baseline", "central")
             .style("opacity", 0.8)
             .style("pointer-events", "none");

            // 북회귀선 (점선)
            g.append("path")
             .datum({type: "LineString", coordinates: [[-140, 23.5], [-30, 23.5]]})
             .attr("class", "tropic-element")
             .attr("d", pathGenerator)
             .attr("stroke", "#c62828")
             .attr("stroke-width", 1)
             .attr("stroke-dasharray", "4,4")
             .attr("fill", "none")
             .style("opacity", 0.6)
             .style("pointer-events", "none")
             .style("display", currentMode === 'study' ? "block" : "none");

            g.append("text")
             .attr("class", "tropic-element")
             .attr("x", projection([-140, 23.5])[0] - 8)
             .attr("y", projection([-140, 23.5])[1])
             .text("북회귀선 (23.5°N)")
             .style("fill", "#c62828")
             .style("font-size", "11px")
             .style("font-weight", "700")
             .style("letter-spacing", "1px")
             .attr("text-anchor", "end")
             .attr("dominant-baseline", "central")
             .style("opacity", 0.8)
             .style("pointer-events", "none")
             .style("display", currentMode === 'study' ? "block" : "none");

            // 남회귀선 (점선)
            g.append("path")
             .datum({type: "LineString", coordinates: [[-140, -23.5], [-30, -23.5]]})
             .attr("class", "tropic-element")
             .attr("d", pathGenerator)
             .attr("stroke", "#c62828")
             .attr("stroke-width", 1)
             .attr("stroke-dasharray", "4,4")
             .attr("fill", "none")
             .style("opacity", 0.6)
             .style("pointer-events", "none")
             .style("display", currentMode === 'study' ? "block" : "none");

            g.append("text")
             .attr("class", "tropic-element")
             .attr("x", projection([-140, -23.5])[0] - 8)
             .attr("y", projection([-140, -23.5])[1])
             .text("남회귀선 (23.5°S)")
             .style("fill", "#c62828")
             .style("font-size", "11px")
             .style("font-weight", "700")
             .style("letter-spacing", "1px")
             .attr("text-anchor", "end")
             .attr("dominant-baseline", "central")
             .style("opacity", 0.8)
             .style("pointer-events", "none")
             .style("display", currentMode === 'study' ? "block" : "none");

            const organicLine = d3.line().curve(d3.curveBasis).x(d => projection(d)[0]).y(d => projection(d)[1]);
            const organicPolygon = d3.line().curve(d3.curveBasisClosed).x(d => projection(d)[0]).y(d => projection(d)[1]);

            g.selectAll('path.terrain-shape')
                .data(terrainFeatures)
                .enter().append('path')
                .attr('class', d => `terrain-feature terrain-shape terrain-shape-${d.type} group-${d.groupId}`)
                .attr('id', d => `shape-${d.id}`)
                .attr('d', d => (d.type === 'mountain' || d.type.startsWith('river')) ? organicLine(d.geometry.coordinates) : organicPolygon(d.geometry.coordinates[0]))
                .style('display', showTerrain ? 'block' : 'none')
                .on('click', handleTerrainClick);

            g.selectAll('text.terrain-text')
                .data(terrainFeatures.filter(d => d.name))
                .enter().append('text')
                .attr('class', d => `terrain-feature terrain-text terrain-text-${d.type} group-${d.groupId}`)
                .attr('id', d => `text-${d.id}`)
                .attr('transform', d => `translate(${projection(d.labelCoords)[0]}, ${projection(d.labelCoords)[1]}) rotate(${d.labelRotate})`)
                .text(d => d.name)
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .style('display', showTerrain ? 'block' : 'none')
                .on('click', handleTerrainClick);

            d3Map = g;
            highlightSelectedCountry();
            if(showTerrain && currentMode === 'study') d3.selectAll('.terrain-feature').style('display', 'block');
        }
        
        function handleTerrainClick(event, d) {
            event.stopPropagation(); 
            const targetGroupId = d.groupId || d.id;
            
            // 이미 선택된 지형인지 확인 (토글 해제를 위함)
            const isAlreadySelected = selectedTerrain && (selectedTerrain.groupId === targetGroupId || selectedTerrain.id === targetGroupId);

            d3.selectAll('.terrain-active').classed('terrain-active', false);
            d3.selectAll('.country').classed('active', false); 
            selectedCountryId = null; 
            
            if (isAlreadySelected) {
                // 이미 선택된 것을 다시 클릭했으므로 선택 해제 상태로 둠
                selectedTerrain = null;
            } else {
                // 새로운 지형 선택
                d3.selectAll(`.group-${targetGroupId}`).classed('terrain-active', true);
                selectedTerrain = terrainFeatures.find(f => (f.id === targetGroupId || f.groupId === targetGroupId) && f.name !== "");
            }
            
            if(currentMode === 'study') renderPanel();
        }
        
        function toggleTerrain() {
            showTerrain = !showTerrain;
            d3.selectAll('.terrain-feature').style('display', showTerrain ? 'block' : 'none');
            const btnSpan = document.getElementById('layer-toggle-text');
            const btnIcon = document.getElementById('layer-toggle-icon');
            
            if(showTerrain) {
                btnSpan.innerText = '자연환경 끄기';
                btnIcon.className = 'fas fa-eye-slash text-[#1565c0] mr-1';
            } else {
                btnSpan.innerText = '자연환경 보기';
                btnIcon.className = 'fas fa-layer-group text-[#8d6e63] mr-1';
                d3.selectAll('.terrain-active').classed('terrain-active', false);
                if(selectedTerrain) selectedTerrain = null;
            }
            if (currentMode === 'study') renderPanel();
        }

        function highlightSelectedCountry() {
            if (!selectedCountryId) return;
            const info = countryInfo[selectedCountryId];

            if (currentMode === 'worldcup' && info && info.wcGroup.includes('조')) {
                const targetGroup = info.wcGroup.substring(0, 2);
                d3.selectAll('.country').classed('wc-group-active', d => {
                    const cInfo = countryInfo[d.properties.name];
                    return cInfo && cInfo.wcGroup && cInfo.wcGroup.substring(0, 2) === targetGroup && d.properties.name !== selectedCountryId;
                });
                d3.select(`#country-${selectedCountryId.replace(/\s+/g, '-')}`).classed('active', true);
            } else {
                d3.select(`#country-${selectedCountryId.replace(/\s+/g, '-')}`).classed('active', true);
            }
        }

        function goHome() {
            stopQuizTimer(); 
            stopEscapeTimer();
            isAnimating = false;
            currentMode = 'home';
            selectedCountryId = null;
            selectedTerrain = null;
            
            const homeScreen = document.getElementById('home-screen');
            homeScreen.style.display = 'block'; 
            setTimeout(() => { homeScreen.style.opacity = '1'; }, 10);
            
            resetMapStyles();
            d3.selectAll('.country').attr('fill', d => getCountryColor(d));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('map-legend').style.display = 'none';
            d3.selectAll('.capital-dot').style('display', 'none');
            
            document.getElementById('layer-toggle-btn').style.display = 'none';
            showTerrain = false;
            d3.selectAll('.terrain-feature').style('display', 'none');
            d3.selectAll('.terrain-active').classed('terrain-active', false);
            d3.selectAll('.tropic-element').style('display', 'none');
            document.getElementById('layer-toggle-text').innerText = '자연환경 보기';
            document.getElementById('layer-toggle-icon').className = 'fas fa-layer-group text-[#8d6e63] mr-1';
            
            // 지도와 패널 레이아웃 원상복구
            const mapContainer = document.getElementById('map-container');
            const panelContainer = document.getElementById('panel-container');
            mapContainer.style.display = 'block';
            panelContainer.classList.add('lg:w-2/5');
            panelContainer.classList.remove('lg:w-full', 'w-full');
            panelContainer.classList.add('bg-[url(\'https://www.transparenttextures.com/patterns/aged-paper.png\')]');

            document.getElementById('panel-container').innerHTML = '';
        }

        function startApp(mode) {
            const homeScreen = document.getElementById('home-screen');
            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.style.display = 'none';
                switchMode(mode);
            }, 500); 
        }

        function switchMode(mode) {
            stopQuizTimer(); 
            isAnimating = false;
            currentMode = mode;
            selectedTerrain = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${mode}`);
            if(activeBtn) activeBtn.classList.add('active');

            const mapLegend = document.getElementById('map-legend');
            const layerBtn = document.getElementById('layer-toggle-btn');
            const mapContainer = document.getElementById('map-container');
            const panelContainer = document.getElementById('panel-container');

            if(mode === 'escape') {
                // 방탈출 모드 초기화
                layerBtn.style.display = 'none';
                mapLegend.style.display = 'none';
                d3.selectAll('.capital-dot').style('display', 'none');
                showTerrain = false;
                d3.selectAll('.terrain-feature').style('display', 'none');
                d3.selectAll('.tropic-element').style('display', 'none');
                
                escapeState = 'login';
                resetMapStyles();
                d3.select('#map').transition().duration(1000).call(zoom.transform, d3.zoomIdentity);
            } else {
                // 일반 모드들 레이아웃 복원
                mapContainer.style.display = 'block';
                panelContainer.className = 'w-full h-[55%] lg:w-2/5 lg:h-full bg-[#fdfbf7] overflow-y-auto relative flex-shrink-0 lg:flex-shrink transition-all duration-500 bg-[url(\'https://www.transparenttextures.com/patterns/aged-paper.png\')]';
                mapLegend.style.display = 'block';
                d3.selectAll('.capital-dot').style('display', 'block');
                
                if (mode === 'study') {
                    layerBtn.style.display = 'block';
                    d3.selectAll('.tropic-element').style('display', 'block');
                } else {
                    layerBtn.style.display = 'none';
                    showTerrain = false;
                    d3.selectAll('.terrain-feature').style('display', 'none');
                    d3.selectAll('.terrain-active').classed('terrain-active', false);
                    d3.selectAll('.tropic-element').style('display', 'none');
                    document.getElementById('layer-toggle-text').innerText = '자연환경 보기';
                    document.getElementById('layer-toggle-icon').className = 'fas fa-layer-group text-[#8d6e63] mr-1';
                }

                if(mode === 'study') {
                    mapLegend.innerHTML = '<i class="fas fa-circle text-[8px] mr-1"></i> 각국의 수도 위치';
                    resetMapStyles();
                    highlightSelectedCountry();
                } else if (mode === 'worldcup') {
                    mapLegend.innerHTML = '<strong class="text-[#3e2723]">대한민국 FIFA 랭킹: 23위</strong>';
                    resetMapStyles();
                    highlightSelectedCountry();
                } else { // quiz
                    d3.selectAll('.capital-dot').style('display', 'none');
                    mapLegend.style.display = 'none';
                    startQuiz();
                }
            }
            
            if(mode !== 'escape') {
                d3.selectAll('.country').attr('fill', d => getCountryColor(d));
            }
            renderPanel();
        }

        // ==========================================
        // 2. 영토 퀴즈 로직
        // ==========================================
        function startQuiz() {
            resetMapStyles();
            selectedCountryId = null;
            score = 0;
            currentQIndex = 0;
            
            const availableCountries = Object.keys(countryInfo);
            for (let i = availableCountries.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableCountries[i], availableCountries[j]] = [availableCountries[j], availableCountries[i]];
            }
            quizQuestions = availableCountries.slice(0, 10);
            renderPanel();
            startQuizTimer(); 
        }

        function handleCountryClick(event, feature) {
            if (isAnimating) return;
            event.stopPropagation(); 
            
            const countryId = feature.properties.name;

            if (currentMode === 'escape') {
                if (escapeState === 'playing') {
                    const data = escapeContent[escapeStoryStep];
                    if (data.qType === 'map_click') {
                        const clickedEl = d3.select(`#country-${countryId.replace(/\s+/g, '-')}`);

                        if (countryId === data.ansTarget) {
                            clickedEl.classed('correct', true);
                            playDoorAnimation(() => {
                                escapeStoryStep++;
                                resetMapStyles(); 
                                const nextData = escapeContent[escapeStoryStep];
                                if(nextData.type === 'story') {
                                    escapeState = 'story';
                                } else if(nextData.type === 'result') {
                                    finishEscapeRoom();
                                    return;
                                } else {
                                    escapeState = 'playing';
                                }
                                renderPanel();
                            });
                        } else {
                            clickedEl.classed('wrong', true);
                            const wrap = document.getElementById(`esc-wrap-${escapeStoryStep}`);
                            if (wrap) {
                                wrap.classList.remove('shake-animation');
                                void wrap.offsetWidth; 
                                wrap.classList.add('shake-animation');
                            }
                            const err = document.getElementById(`esc-err-${escapeStoryStep}`);
                            if (err) err.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 틀렸습니다! 다시 한 번 지도를 잘 살펴보세요.`;

                            setTimeout(() => {
                                clickedEl.classed('wrong', false);
                            }, 800);
                        }
                    }
                }
                return; // 방탈출 모드에서는 일반 클릭 이벤트 무시
            }

            d3.selectAll('.terrain-active').classed('terrain-active', false);
            selectedTerrain = null;

            if (currentMode === 'study' || currentMode === 'worldcup') {
                if(!countryInfo[countryId]) return; 
                if (selectedCountryId === countryId) {
                    selectedCountryId = null;
                } else {
                    selectedCountryId = countryId;
                }
                d3.selectAll('.country').attr('fill', d => getCountryColor(d));
                resetMapStyles();
                highlightSelectedCountry();
                renderPanel();

                if(window.innerWidth < 1024) {
                    document.getElementById('panel-container').scrollIntoView({ behavior: 'smooth' });
                }

            } else if (currentMode === 'quiz') {
                stopQuizTimer(); 
                const targetId = quizQuestions[currentQIndex];
                const clickedEl = d3.select(`#country-${countryId.replace(/\s+/g, '-')}`);
                const targetEl = d3.select(`#country-${targetId.replace(/\s+/g, '-')}`);

                isAnimating = true;
                if (countryId === targetId) {
                    clickedEl.classed('correct', true);
                    score += 10;
                    showQuizFeedback('correct');
                    setTimeout(nextQuestion, 1500);
                } else {
                    clickedEl.classed('wrong', true);
                    targetEl.classed('correct', true);
                    showQuizFeedback('wrong', countryId); 
                }
            }
        }

        function nextQuestion() {
            resetMapStyles();
            currentQIndex++;
            isAnimating = false;
            
            if (currentQIndex >= quizQuestions.length) {
                currentMode = 'result';
                renderPanel();
            } else {
                renderPanel();
                startQuizTimer(); 
            }
        }

        function resetMapStyles() {
            d3.selectAll('.country').classed('active', false).classed('correct', false).classed('wrong', false).classed('wc-group-active', false);
        }

        function startQuizTimer() {
            clearInterval(quizTimerInterval);
            quizTimeRemaining = 10;
            updateTimerUI();
            
            quizTimerInterval = setInterval(() => {
                quizTimeRemaining--;
                updateTimerUI();
                if (quizTimeRemaining <= 0) {
                    clearInterval(quizTimerInterval);
                    handleQuizTimeout();
                }
            }, 1000);
        }

        function stopQuizTimer() { clearInterval(quizTimerInterval); }

        function updateTimerUI() {
            const timeText = document.getElementById('quiz-time-text');
            const timeBar = document.getElementById('quiz-time-bar');
            if (timeText && timeBar) {
                timeText.innerText = quizTimeRemaining;
                const percentage = (quizTimeRemaining / 10) * 100;
                timeBar.style.width = `${percentage}%`;
                
                if (quizTimeRemaining <= 3) {
                    timeBar.classList.remove('bg-green-600');
                    timeBar.classList.add('bg-red-600');
                    timeText.classList.add('text-red-600');
                } else {
                    timeBar.classList.add('bg-green-600');
                    timeBar.classList.remove('bg-red-600');
                    timeText.classList.remove('text-red-600');
                }
            }
        }

        function handleQuizTimeout() {
            isAnimating = true; 
            const targetId = quizQuestions[currentQIndex];
            const targetEl = d3.select(`#country-${targetId.replace(/\s+/g, '-')}`);
            targetEl.classed('correct', true); 
            showQuizFeedback('timeout');
        }

        function showQuizFeedback(type, clickedCountryId = null) {
            const feedbackEl = document.getElementById('quiz-feedback');
            if(!feedbackEl) return;
            
            feedbackEl.style.opacity = '1';
            
            if(type === 'correct') {
                feedbackEl.innerHTML = '<span class="text-green-700 font-bold text-sm tracking-wide bg-green-50 px-4 py-2 rounded-full border border-green-200"><i class="fas fa-check-circle"></i> 정답입니다!</span>';
            } else if (type === 'timeout') {
                feedbackEl.innerHTML = `
                    <div class="mb-3 lg:mb-4 text-red-600 font-bold text-xs lg:text-sm tracking-wide"><i class="fas fa-clock"></i> 시간 초과! 올바른 위치가 초록색으로 표시됩니다.</div>
                    <button onclick="nextQuestion()" class="px-5 lg:px-6 py-2 border-2 border-[#d7ccc8] text-[#5d4037] font-bold text-xs lg:text-sm hover:bg-[#e6e2d8] transition-colors rounded-xl shadow-sm">다음 문제로 넘어가기</button>
                `;
            } else {
                let clickedNameKo = "알 수 없는 지역";
                if (clickedCountryId && countryInfo[clickedCountryId]) clickedNameKo = countryInfo[clickedCountryId].ko;

                feedbackEl.innerHTML = `
                    <div class="mb-2 text-red-600 font-bold text-xs lg:text-sm tracking-wide"><i class="fas fa-times-circle"></i> 오답입니다!</div>
                    <div class="mb-3 lg:mb-4 text-[10px] lg:text-sm text-[#5d4037] bg-white border border-[#d7ccc8] py-2 px-3 lg:px-4 rounded-xl inline-block shadow-sm">

        // ==========================================
        // 4. 방탈출(전체화면 탐험) 로직
        // ==========================================
        function beginEscapeRoom() {
            const c = document.getElementById('esc-class').value;
            const n = document.getElementById('esc-name').value.trim();
            const errEl = document.getElementById('login-error');
            
            if(!c || !n) {
                if(errEl) {
                    errEl.innerText = "반과 이름을 정확히 입력해주세요!";
                    errEl.classList.remove('hidden');
                }
                return;
            }
            if(errEl) errEl.classList.add('hidden');
            
            escapeClass = c;
            escapeName = n;
            escapeStoryStep = 0;
            escapeState = 'story';
            renderPanel();
        }

        function nextEscapeStep() {
            if(escapeState === 'story') {
                escapeStoryStep++;
                if(escapeStoryStep >= escapeContent.length) return;
                const nextData = escapeContent[escapeStoryStep];
                
                if(nextData.type === 'quiz') {
                    escapeState = 'playing';
                    // 첫 문제 진입 시 타이머 구동
                    if(!escapeStartTime) startEscapeTimer();
                } else if(nextData.type === 'result') {
                    finishEscapeRoom();
                    return;
                }
                renderPanel();
            }
        }

        function submitEscapeAnswer(qIdx) {
            const qData = escapeContent[qIdx];
            let isCorrect = false;

            if(qData.qType === 'subjective') {
                const inputVal = document.getElementById(`esc-input-${qIdx}`).value.replace(/\s+/g, '');
                const validAns = qData.ans.map(a => a.replace(/\s+/g, ''));
                if(validAns.includes(inputVal)) isCorrect = true;
            } else if(qData.qType === 'objective') {
                const checked = document.querySelector(`input[name="esc-opt-${qIdx}"]:checked`);
                if(checked && parseInt(checked.value) === qData.ansIdx) isCorrect = true;
            }

            if(isCorrect) {
                // 문이 열리는 애니메이션 오버레이 실행 후 다음 퀴즈 진행
                playDoorAnimation(() => {
                    escapeStoryStep++;
                    const nextData = escapeContent[escapeStoryStep];
                    if(nextData.type === 'story') {
                        escapeState = 'story';
                    } else if(nextData.type === 'result') {
                        finishEscapeRoom();
                        return;
                    } else {
                        escapeState = 'playing';
                    }
                    renderPanel();
                });
            } else {
                // 오답 시 흔들림 애니메이션 및 힌트 제공
                const wrap = document.getElementById(`esc-wrap-${qIdx}`);
                wrap.classList.remove('shake-animation');
                void wrap.offsetWidth; 
                wrap.classList.add('shake-animation');
                
                const err = document.getElementById(`esc-err-${qIdx}`);
                err.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 오답입니다! 배운 지식을 다시 떠올려보세요.`;
            }
        }

        function playDoorAnimation(callback) {
            const overlay = document.getElementById('door-overlay');
            const doorLeft = document.getElementById('door-left');
            const doorRight = document.getElementById('door-right');
            const doorText = document.getElementById('door-text');

            // 초기 상태 세팅 (닫혀있음)
            doorLeft.style.transform = 'translateX(0)';
            doorRight.style.transform = 'translateX(0)';
            doorText.style.opacity = '1';
            overlay.classList.remove('hidden');

            // 0.6초 후 문 열림
            setTimeout(() => {
                doorLeft.style.transform = 'translateX(-100%)';
                doorRight.style.transform = 'translateX(100%)';
                doorText.style.opacity = '0';
            }, 600);

            // 애니메이션 종료 후 콜백 실행 (다음 화면 렌더링)
            setTimeout(() => {
                overlay.classList.add('hidden');
                callback();
            }, 1600);
        }

        function startEscapeTimer() {
            escapeStartTime = Date.now();
            escapeTimerInterval = setInterval(() => {
                escapeTimeElapsed = Date.now() - escapeStartTime;
                const txt = document.getElementById('esc-live-timer');
                if(txt) txt.innerText = formatTime(escapeTimeElapsed);
            }, 10);
        }

        function stopEscapeTimer() { clearInterval(escapeTimerInterval); }

        function formatTime(ms) {
            let totalSec = Math.floor(ms / 1000);
            let m = Math.floor(totalSec / 60);
            let s = totalSec % 60;
            let milli = Math.floor((ms % 1000) / 10);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${milli.toString().padStart(2, '0')}`;
        }

        // --- 추가된 기능: 기록 초기화 로직 (암호 보호) ---
        window.handleResetClick = function() {
            const modal = document.getElementById('password-modal');
            if(modal) {
                modal.classList.remove('hidden');
                const input = document.getElementById('reset-password-input');
                if(input) {
                    input.value = '';
                    input.focus();
                }
                const err = document.getElementById('password-error');
                if(err) err.classList.add('hidden');
            }
        };

        window.cancelReset = function() {
            const modal = document.getElementById('password-modal');
            if(modal) modal.classList.add('hidden');
        };

        window.confirmResetPassword = function() {
            const input = document.getElementById('reset-password-input');
            const err = document.getElementById('password-error');
            
            if(input && input.value === '아메리카1234') {
                // 실제 삭제 수행
                localStorage.removeItem('america_escape_rankings_v2');
                window.globalEscapeRankings = [];
                if (window.isFirebaseReady && window.clearCloudRankings) {
                    window.clearCloudRankings();
                }
                showLeaderboard(); // 화면 즉시 새로고침
            } else {
                // 오류 표시
                if(err) err.classList.remove('hidden');
            }
        };

        // 실시간 연동을 위해 랭킹 화면 갱신 함수를 전역에 등록
        window.refreshLeaderboard = function() {
            if (currentMode === 'escape' && escapeState === 'leaderboard') {
                renderPanel();
            }
        };

        function finishEscapeRoom() {
            stopEscapeTimer();
            escapeState = 'result';
            
            const rankingData = { class: escapeClass, name: escapeName, timeMs: escapeTimeElapsed, timeStr: formatTime(escapeTimeElapsed), date: new Date().toISOString() };
            
            // 실시간 클라우드 DB에 기록 저장
            if (window.isFirebaseReady && window.saveRankingToCloud) {
                window.saveRankingToCloud(rankingData);
            } else {
                console.warn("실시간 서버가 연결되지 않아 기록이 저장되지 않았습니다.");
                // 임시로 현재 화면에만 띄워주기
                window.globalEscapeRankings.push(rankingData);
            }
            
            renderPanel();
        }

            escapeState = 'leaderboard';
            renderPanel();
        }

                            <div class="w-full max-w-lg mx-auto bg-[#fdfbf7]/95 backdrop-blur-md p-8 rounded-2xl border-4 border-amber-900/40 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                                <div class="mb-5 text-left">
                                    <label class="block text-sm font-bold text-amber-900 mb-2">소속 학급</label>
                                    <select id="esc-class" class="w-full bg-white border-2 border-amber-900/20 text-stone-900 rounded-xl p-4 font-bold focus:outline-none focus:border-amber-700 focus:ring-2 focus:ring-amber-700/50 transition-all shadow-inner">
                                        <option value="" disabled selected>반을 선택하세요</option>
                                        ${[1,2,3,4,5,6,7,8].map(i=> `<option value="${i}반">${i}반</option>`).join('')}
                                    </select>
                                </div>
                                <div class="mb-8 text-left">
                                    <label class="block text-sm font-bold text-amber-900 mb-2">탐험가 실명</label>
                                    <input type="text" id="esc-name" placeholder="이름을 입력하세요" class="w-full bg-white border-2 border-amber-900/20 text-stone-900 rounded-xl p-4 font-bold focus:outline-none focus:border-amber-700 focus:ring-2 focus:ring-amber-700/50 transition-all shadow-inner">
                                </div>
                                <p id="login-error" class="text-sm font-bold text-red-600 mb-4 hidden"></p>
                                <button onclick="beginEscapeRoom()" class="w-full py-4 bg-amber-800 text-white font-black text-lg rounded-xl hover:bg-amber-900 transition-colors shadow-lg border border-amber-700">
                                    탐험 시작하기
                                </button>
                                <button onclick="showLeaderboard()" class="w-full mt-4 py-4 bg-white border-2 border-amber-900/20 text-amber-900 font-bold text-base rounded-xl hover:bg-amber-50 transition-colors">
                                    <i class="fas fa-trophy text-amber-500 mr-2"></i> 학급 랭킹 보기
                                </button>
                            </div>
                        </div>
                    `;
                } else if(escapeState === 'story') {
                    const data = escapeContent[escapeStoryStep];
                    escapeHtml = `
                        <div class="text-center w-full max-w-4xl mx-auto bg-[#fdfbf7]/95 p-10 lg:p-14 rounded-3xl border-4 border-amber-900/40 shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-[url('https://www.transparenttextures.com/patterns/aged-paper.png')] z-10">
                            <h3 class="text-3xl lg:text-4xl font-black text-amber-900 mb-8">${data.title}</h3>
                            <p class="text-lg lg:text-2xl text-stone-800 leading-relaxed font-bold mb-12 break-keep">${data.text}</p>
                            <button onclick="nextEscapeStep()" class="px-12 py-4 bg-amber-800 text-white font-bold rounded-xl hover:bg-amber-900 transition-colors shadow-lg text-lg border border-amber-700">
                                ${data.btn} <i class="fas fa-arrow-right ml-2"></i>
                            </button>
                        </div>
                    `;
                } else if(escapeState === 'playing') {
                    const data = escapeContent[escapeStoryStep];
                    let qNum = 0;
                    for(let i=0; i<=escapeStoryStep; i++) if(escapeContent[i].type==='quiz') qNum++;

                    let inputHtml = '';
                    let submitBtnHtml = '';
                    
                    if (data.qType === 'map_click') {
                        inputHtml = `
                            <div class="w-full max-w-md mx-auto text-center p-4 bg-amber-100/80 border-2 border-amber-400 rounded-xl animate-pulse shadow-sm mb-6">
                                <span class="text-amber-900 font-bold text-lg"><i class="fas fa-hand-pointer mr-2"></i>지도에서 알맞은 국가를 찾아 클릭하세요!</span>
                            </div>
                        `;
                    } else if(data.qType === 'subjective') {
                        inputHtml = `
                            <input type="text" id="esc-input-${escapeStoryStep}" placeholder="정답 입력..." class="w-full max-w-md mx-auto text-center text-2xl lg:text-3xl font-black p-4 border-b-4 border-amber-900/30 bg-transparent focus:outline-none focus:border-amber-800 text-stone-900 mb-6 placeholder-stone-400 transition-colors block">
                        `;
                        submitBtnHtml = `
                            <div class="mt-auto pt-8">
                                <button onclick="submitEscapeAnswer(${escapeStoryStep})" class="w-full max-w-md mx-auto py-4 bg-amber-800 text-white font-bold text-xl rounded-xl hover:bg-amber-900 transition-colors shadow-lg block border border-amber-700">
                                    정답 제출
                                </button>
                            </div>
                        `;
                    } else {
                        inputHtml = `<div class="space-y-3 mb-6 w-full max-w-md mx-auto text-left">`;
                        data.opts.forEach((opt, idx) => {
                            inputHtml += `
                                <label class="flex items-center p-4 bg-white/80 border-2 border-amber-900/20 rounded-xl cursor-pointer hover:bg-amber-100 transition-colors shadow-sm">
                                    <input type="radio" name="esc-opt-${escapeStoryStep}" value="${idx+1}" class="w-6 h-6 text-amber-700 bg-white border-amber-400 focus:ring-amber-800">
                                    <span class="ml-4 text-lg font-bold text-stone-800">${idx+1}. ${opt}</span>
                                </label>
                            `;
                        });
                        inputHtml += `</div>`;
                        submitBtnHtml = `
                            <div class="mt-auto pt-8">
                                <button onclick="submitEscapeAnswer(${escapeStoryStep})" class="w-full max-w-md mx-auto py-4 bg-amber-800 text-white font-bold text-xl rounded-xl hover:bg-amber-900 transition-colors shadow-lg block border border-amber-700">
                                    정답 제출
                                </button>
                            </div>
                        `;
                    }

                    escapeHtml = `
                        <div class="flex flex-col h-full w-full max-w-4xl mx-auto z-10">
                            <div class="w-full flex justify-between items-center mb-8 border-b-2 border-stone-400/30 pb-4">
                                <div>
                                    <span class="block text-xs font-bold tracking-widest text-amber-400 uppercase drop-shadow-md">ESCAPE ROOM</span>
                                    <span class="text-xl lg:text-2xl text-white font-black drop-shadow-md">관문 ${qNum} / 12</span>
                                </div>
                                <div class="text-right bg-stone-900/80 px-4 py-2 rounded-xl border border-amber-500/30 shadow-lg flex items-center gap-3 backdrop-blur-md">
                                    <i class="fas fa-stopwatch text-red-500 text-xl animate-pulse"></i>
                                    <span id="esc-live-timer" class="text-xl lg:text-2xl font-mono font-bold text-red-400 w-28 text-right">00:00.00</span>
                                </div>
                            </div>
                            
                            <div id="esc-wrap-${escapeStoryStep}" class="flex-1 w-full bg-[#fdfbf7]/95 border-4 border-amber-900/40 rounded-3xl p-8 lg:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col justify-center text-center relative bg-[url('https://www.transparenttextures.com/patterns/aged-paper.png')]">
                                <div class="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-amber-800 text-white w-16 h-16 rounded-full flex items-center justify-center font-bold shadow-xl text-2xl border-4 border-[#fdfbf7]"><i class="fas fa-key"></i></div>
                                
                                <h3 class="text-xl lg:text-2xl font-black text-stone-800 leading-loose mb-10 break-keep">${data.q}</h3>
                                
                                ${inputHtml}
                                
                                <p id="esc-err-${escapeStoryStep}" class="text-sm font-bold text-red-600 min-h-[1.5rem] mb-6"></p>
                                
                                ${submitBtnHtml}
                            </div>
                        </div>
                    `;
                } else if(escapeState === 'result') {
                    escapeHtml = `
                        <div class="flex flex-col items-center justify-center w-full max-w-4xl mx-auto z-10 text-center">
                            <div class="w-28 h-28 bg-amber-400 text-stone-900 rounded-full flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(251,191,36,0.5)] border-4 border-amber-200">
                                <i class="fas fa-compass text-6xl"></i>
                            </div>
                            <h2 class="text-5xl lg:text-6xl font-black text-amber-400 mb-4 tracking-tight drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">탈출 성공!</h2>
                            <p class="text-xl text-stone-200 font-bold mb-10 drop-shadow-md">모든 관문을 통과하고 아메리카 대륙의 마스터가 되었습니다.</p>
                            
                            <div class="w-full max-w-md bg-[#fdfbf7]/95 p-8 rounded-2xl border-4 border-amber-900/40 shadow-2xl mb-8 bg-[url('https://www.transparenttextures.com/patterns/aged-paper.png')] mx-auto">
                                <span class="block text-sm font-bold text-amber-900 mb-2">최종 기록</span>
                                <div class="text-5xl lg:text-6xl font-mono font-black text-red-700 mb-6 drop-shadow-sm">${formatTime(escapeTimeElapsed)}</div>
                                <span class="inline-block text-base font-bold text-stone-100 bg-stone-800 px-6 py-2 rounded-full border-2 border-stone-600 shadow-inner">${escapeClass} ${escapeName}</span>
                            </div>

                            <button onclick="showLeaderboard()" class="w-full max-w-md mx-auto py-4 bg-amber-800 text-white font-bold text-xl rounded-xl hover:bg-amber-900 transition-colors shadow-lg border border-amber-700">
                                <i class="fas fa-list-ol mr-2"></i> 학급 랭킹 확인
                            </button>
                        </div>
                    `;
                } else if(escapeState === 'leaderboard') {
                    let rankings = window.globalEscapeRankings || [];
                    let targetClass = escapeClass || '1반'; 
                    
                    // 해당 반 학생들만 추려서 시간순(오름차순) 정렬
                    rankings = rankings.filter(r => r.class === targetClass).sort((a,b) => a.timeMs - b.timeMs);
                    
                    let listHtml = '';
                    if(!window.isFirebaseReady && rankings.length === 0) {
                        listHtml = `<p class="text-center text-lg font-bold text-red-600 py-16"><i class="fas fa-wifi mb-2 text-2xl block"></i>서버가 연결되지 않았습니다.<br><span class="text-sm text-stone-500 font-medium mt-2 block">관리자 설정이 필요합니다.</span></p>`;
                    } else if(rankings.length === 0) {
                        listHtml = `<p class="text-center text-lg font-bold text-stone-400 py-16">아직 등록된 기록이 없습니다.</p>`;
                    } else {
                        rankings.forEach((r, idx) => {
                            let rankIcon = `<span class="w-10 h-10 rounded-full bg-stone-200 text-stone-700 flex items-center justify-center text-base font-black shadow-inner border border-stone-300">${idx+1}</span>`;
                            if(idx===0) rankIcon = `<i class="fas fa-crown text-yellow-500 text-4xl drop-shadow-md"></i>`;
                            else if(idx===1) rankIcon = `<i class="fas fa-medal text-stone-400 text-4xl drop-shadow-md"></i>`;
                            else if(idx===2) rankIcon = `<i class="fas fa-medal text-orange-400 text-4xl drop-shadow-md"></i>`;

                            listHtml += `
                                <div class="flex justify-between items-center p-4 bg-white/90 border-2 border-amber-900/10 rounded-xl mb-3 shadow-sm hover:shadow-md transition-shadow">
                                    <div class="flex items-center gap-5">
                                        <div class="w-12 flex justify-center">${rankIcon}</div>
                                        <span class="font-black text-stone-800 text-xl">${r.name}</span>
                                    </div>
                                    <span class="font-mono font-black text-red-600 text-2xl">${r.timeStr}</span>
                                </div>
                            `;
                        });
                    }

                    escapeHtml = `
                        <div class="flex flex-col h-full w-full max-w-4xl mx-auto z-10 bg-[#fdfbf7]/95 border-4 border-amber-900/40 rounded-3xl p-6 lg:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-[url('https://www.transparenttextures.com/patterns/aged-paper.png')] relative">
                            
                            <!-- 패스워드 입력 모달 (기본 숨김) -->
                            <div id="password-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-stone-900/80 backdrop-blur-sm rounded-3xl">
                                <div class="bg-white p-6 lg:p-8 rounded-2xl shadow-2xl w-80 text-center border-4 border-amber-900/40">
                                    <h3 class="text-xl font-black text-amber-900 mb-4"><i class="fas fa-lock mr-2"></i>관리자 권한</h3>
                                    <p class="text-sm text-stone-600 mb-4 font-bold">전체 기록을 초기화하시려면<br>암호를 입력하세요.</p>
                                    <input type="password" id="reset-password-input" class="w-full border-2 border-stone-200 rounded-lg p-3 text-center mb-4 focus:outline-none focus:border-amber-700 font-bold" placeholder="암호 입력">
                                    <p id="password-error" class="text-xs text-red-600 font-bold mb-4 hidden">암호가 일치하지 않습니다.</p>
                                    <div class="flex gap-2">
                                        <button onclick="cancelReset()" class="flex-1 py-3 bg-stone-200 text-stone-700 font-bold rounded-xl hover:bg-stone-300 transition-colors">취소</button>
                                        <button onclick="confirmResetPassword()" class="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition-colors shadow-md">초기화</button>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b-4 border-amber-900/20 pb-6 gap-4">
                                <h2 class="text-3xl lg:text-4xl font-black text-amber-900"><i class="fas fa-trophy text-amber-500 mr-3 drop-shadow-md"></i>명예의 전당</h2>
                                <div class="flex items-center gap-2">
                                    <button onclick="handleResetClick()" class="bg-white border-2 border-amber-900/20 text-[#5d4037] hover:text-red-600 hover:border-red-200 hover:bg-red-50 rounded-xl px-4 py-3 font-bold text-sm shadow-sm transition-all cursor-pointer whitespace-nowrap">
                                        <i class="fas fa-trash-alt mr-1"></i>기록 초기화
                                    </button>
                                    <select id="esc-rank-filter" onchange="escapeClass=this.value; showLeaderboard();" class="bg-white border-2 border-amber-900/20 text-stone-900 rounded-xl px-4 py-3 font-bold text-base focus:outline-none focus:ring-2 focus:ring-amber-700 shadow-sm cursor-pointer">
                                        ${[1,2,3,4,5,6,7,8].map(i=> `<option value="${i}반" ${targetClass==i+'반'?'selected':''}>${i}반</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            
                            <div class="flex-1 overflow-y-auto pr-4 custom-scrollbar">
                                ${listHtml}
                            </div>
                            
                            <div class="mt-8 pt-6 border-t-4 border-amber-900/20">
                                <button onclick="escapeState='login'; renderPanel();" class="w-full py-4 bg-white border-2 border-amber-900/30 text-amber-900 font-black text-xl rounded-xl hover:bg-amber-50 transition-colors shadow-sm">
                                    방탈출 홈으로
                                </button>
                            </div>
                        </div>
                    `;
                }

                const justifyClass = isMapClick ? 'justify-start' : 'justify-center';
                panel.innerHTML = `
                    <div class="relative min-h-full w-full bg-cover bg-center bg-fixed flex flex-col items-center ${justifyClass} p-6 lg:p-10" style="background-image: url('https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=1920&auto=format&fit=crop');">
                        <div class="absolute inset-0 bg-stone-900/75 backdrop-blur-[2px]"></div>
                        ${escapeHtml}
                    </div>
                `;

            } else if (currentMode === 'quiz') {
                const targetId = quizQuestions[currentQIndex];
                const targetKo = countryInfo[targetId].ko;

                panel.innerHTML = `
                    <div class="p-5 lg:p-8 h-full flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-end border-b-2 border-[#e6e2d8] pb-3 lg:pb-4 mb-5 lg:mb-6">
                                <div>
                                    <span class="block text-[10px] lg:text-xs font-bold tracking-widest text-[#a1887f] uppercase mb-1">GEOGRAPHY QUIZ</span>
                                    <span class="text-xs lg:text-sm text-[#3e2723] font-bold">문제 ${currentQIndex + 1} / ${quizQuestions.length}</span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-[10px] lg:text-xs font-bold text-[#1565c0] uppercase tracking-widest mb-1">SCORE</span>
                                    <span class="text-lg lg:text-xl font-bold text-[#1565c0]">${score}</span>
                                </div>
                            </div>
                            
                            <div class="w-full bg-[#e6e2d8] rounded-full h-1.5 lg:h-2 mb-2">
                                <div id="quiz-time-bar" class="bg-green-600 h-1.5 lg:h-2 rounded-full transition-all duration-1000 ease-linear" style="width: 100%"></div>
                            </div>
                            <div class="text-right text-[10px] lg:text-xs font-bold text-[#8d6e63] mb-5 lg:mb-8">남은 시간: <span id="quiz-time-text" class="text-[#3e2723] text-sm lg:text-base">10</span>초</div>
                            
                            <div class="text-center bg-white py-8 lg:py-10 px-4 rounded-xl border-2 border-[#e6e2d8] shadow-sm relative overflow-hidden">
                                <div class="absolute -left-4 -bottom-4 opacity-5 text-8xl"><i class="fas fa-globe-americas"></i></div>
                                <span class="block text-xs lg:text-sm font-bold text-[#8d6e63] mb-3 lg:mb-4 relative z-10">👇 10초 안에 아래 국가를 클릭하세요!</span>
                                <h2 class="text-4xl lg:text-5xl font-adventure font-bold text-[#3e2723] tracking-tight relative z-10">${targetKo}</h2>
                            </div>
                        </div>
                        
                        <div id="quiz-feedback" class="py-4 text-center opacity-0 transition-opacity duration-300"></div>
                    </div>
                `;
            } else if (currentMode === 'result') {
                panel.innerHTML = `
                    <div class="p-5 lg:p-8 flex flex-col h-full items-center justify-center text-center">
                        <div class="w-12 h-12 lg:w-16 lg:h-16 bg-white border-2 border-[#e6e2d8] rounded-full flex items-center justify-center mb-4 shadow-sm">
                            <i class="fas fa-check text-xl lg:text-2xl text-[#2e7d32]"></i>
                        </div>
                        <span class="block text-[10px] lg:text-xs font-bold tracking-widest text-[#a1887f] uppercase mb-2">ASSESSMENT COMPLETE</span>
                        <h2 class="text-2xl lg:text-3xl font-adventure font-bold text-[#3e2723] mb-6 lg:mb-8">영토 위치 퀴즈 완료</h2>
                        
                        <div class="mb-8 lg:mb-12 bg-white w-full py-6 lg:py-8 rounded-xl border-2 border-[#e6e2d8] shadow-sm">
                            <span class="block text-xs lg:text-sm font-bold text-[#8d6e63] mb-2">최종 점수</span>
                            <div class="text-5xl lg:text-7xl font-bold text-[#1565c0]">${score}</div>
                        </div>

                        <div class="w-full space-y-3 max-w-xs mx-auto">
                            <button onclick="switchMode('study')" class="w-full py-3 border-2 border-[#d7ccc8] text-[#5d4037] text-xs lg:text-sm font-bold hover:bg-[#e6e2d8] transition-colors rounded-lg shadow-sm">
                                탐색 모드로 돌아가기
                            </button>
                            <button onclick="switchMode('quiz')" class="w-full py-3 bg-[#3e2723] text-white text-xs lg:text-sm font-bold hover:bg-[#1f1209] transition-colors rounded-lg shadow-md">
                                다시 도전하기
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
